services:
  - type: web
    name: ap-workflow-backend
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn ap_workflow.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: APP_NAME
        value: AP Workflow Agent
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"