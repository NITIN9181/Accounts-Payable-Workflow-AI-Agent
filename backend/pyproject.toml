    "sqlalchemy>=2.0.36,<2.1.0",
    "alembic>=1.14.0,<1.15.0",
    "httpx>=0.28.0,<0.29.0",
    "aiohttp>=3.11.0,<3.12.0",
    "redis>=5.2.0,<5.3.0",
    "upstash-redis>=1.1.0,<1.2.0",
    "pytesseract>=0.3.13,<0.4.0",
