    "websockets>=14.0,<15.0",
    "imaplib2>=3.6,<3.7.0",
    "mail-parser>=3.15.0,<3.16.0",
    "pytest>=8.3.0,<8.4.0",
    "pytest-asyncio>=0.24.0,<0.25.0",
    "pytest-cov>=6.0.0,<6.1.0",
